name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build Web Assets
        run: npm run build

      - name: Install Dependencies
        run: npm install

      - name: Capacitor Doctor
        run: npx cap doctor android || true

      - name: Sync Capacitor
        run: npx cap sync android --verbose
        continue-on-error: true

      - name: Force Update if Sync Failed
        run: |
          npx cap update android --verbose
          npx cap copy android --verbose

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
